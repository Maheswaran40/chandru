<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup · Bootstrap UI</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        body {
            background: linear-gradient(145deg, #f8f9fc 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }
        .signup-card {
            max-width: 440px;
            width: 100%;
            border: none;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s ease;
        }
        .signup-card:hover {
            transform: translateY(-4px);
        }
        .signup-card .card-body {
            padding: 2.5rem 2rem;
        }
        .form-floating > .form-control {
            border-radius: 1.25rem;
            background: #ffffffcc;
            border: 1px solid #dee2e6;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-floating > .form-control:focus {
            border-color: #6c7ae0;
            box-shadow: 0 0 0 4px rgba(108, 122, 224, 0.2);
            background: #fff;
        }
        .form-floating > label {
            padding-left: 1.25rem;
            color: #6c757d;
            font-weight: 450;
        }
        .btn-signup {
            border-radius: 2rem;
            padding: 0.65rem 1.5rem;
            font-weight: 600;
            background: #6c7ae0;
            border: none;
            color: white;
            transition: all 0.2s;
            box-shadow: 0 8px 16px -6px #6c7ae066;
        }
        .btn-signup:hover {
            background: #5a68c7;
            transform: scale(1.01);
            box-shadow: 0 12px 20px -8px #4a56b0aa;
        }
        .btn-signup:active {
            transform: scale(0.97);
        }
        .login-link {
            font-weight: 500;
            color: #4a56b0;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .login-link:hover {
            color: #2f3a8a;
            border-bottom-color: #6c7ae0;
        }
        .icon-input {
            position: relative;
        }
        .icon-input .bi {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #8b95a9;
            z-index: 4;
            font-size: 1.1rem;
        }
        .icon-input .form-control {
            padding-left: 2.8rem;
        }
        .divider {
            display: flex;
            align-items: center;
            color: #9aa3b5;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .divider hr {
            flex: 1;
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, #ccd3e0, transparent);
        }
        .divider span {
            padding: 0 1rem;
        }
        .form-floating {
            margin-bottom: 0.5rem;
        }
        .register-hint {
            font-size: 0.95rem;
        }
        @media (max-width: 480px) {
            .signup-card .card-body {
                padding: 2rem 1.25rem;
            }
        }
    </style>
</head>
<body>

<div class="signup-card card">
    <div class="card-body">
        <!-- header -->
        <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-2" style="width: 68px; height: 68px; align-items: center; justify-content: center;">
                <i class="bi bi-person-plus text-primary" style="font-size: 2.6rem;"></i>
            </div>
            <h4 class="fw-bold text-dark mb-1">Create account</h4>
            <p class="text-secondary small">Join us – it's quick and easy</p>
        </div>

        <!-- signup form (original onsubmit preserved) -->
        <form onsubmit="signup(event)" novalidate>
            <!-- username -->
            <div class="form-floating mb-3 icon-input">
                <i class="bi bi-person-fill"></i>
                <input type="text" class="form-control" id="username" placeholder="johndoe" required />
                <label for="username">Username</label>
            </div>

            <!-- email -->
            <div class="form-floating mb-3 icon-input">
                <i class="bi bi-envelope-fill"></i>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required />
                <label for="email">Email address</label>
            </div>

            <!-- password -->
            <div class="form-floating mb-3 icon-input">
                <i class="bi bi-lock-fill"></i>
                <input type="password" class="form-control" id="password" placeholder="Password" required />
                <label for="password">Password</label>
            </div>

            <!-- terms (optional) -->
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="termsCheck" style="border-radius: 0.4rem; border-color: #bcc3d4;" />
                <label class="form-check-label small text-secondary" for="termsCheck">
                    I agree to the <a href="#" class="text-primary text-decoration-none">Terms</a> &amp; <a href="#" class="text-primary text-decoration-none">Privacy</a>
                </label>
            </div>

            <!-- submit button -->
            <button type="submit" class="btn btn-signup w-100">
                <i class="bi bi-person-plus me-2"></i> Sign up
            </button>

            <!-- divider -->
            <div class="divider my-4">
                <hr />
                <span>or</span>
                <hr />
            </div>

            <!-- login link (matches login page style) -->
            <div class="text-center register-hint">
                <span class="text-secondary">Already have an account?</span>
                <a href="../../index.html" class="login-link ms-1">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Log in
                </a>
            </div>
        </form>

        <!-- footer note -->
        <p class="text-center text-muted mt-4 mb-0 small" style="opacity: 0.7;">
            <i class="bi bi-shield-check me-1"></i> secure · signup demo
        </p>
    </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- your original script (register.js) – keep exactly as before -->
<script src="../script/register.js">

</script>



</body>
</html>
